<!DOCTYPE html>
<html lang="pt-br">
<!-- Página de Criar Conta -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CajomaX — Criar Conta</title>

    <link rel="icon" href="../assets/icons/icon_abaCajomax.png" type="image/png">
    <!-- CSS global -->
    <link rel="stylesheet" href="../css/global.css">
    <!-- CSS próprio da página -->
    <link rel="stylesheet" href="../css/criarConta.css">
</head>

<body>
    <!-- ── HEADER ── -->
    <header class="header">
        <a href="../index.html">
            <img class="icon" src="../assets/icons/mascote_cajomaxIcon.ico" alt="Logo CajomaX">
        </a>
        <a href="login.html">
            <img class="img" src="../assets/icons/user_icon.png" alt="Logar">
        </a>
    </header>

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <nav>
            <a href="../index.html">
                <img src="../assets/icons/home.webp" alt="Home">
                <span>Home</span>
            </a>
            <a href="config.html">
                <img src="../assets/icons/setting.webp" alt="Config">
                <span>Configuração</span>
            </a>
            <a href="suporte.html">
                <img src="../assets/icons/support.webp" alt="Suporte">
                <span>Suporte</span>
            </a>
            <a href="sobre.html">
                <img src="../assets/icons/question.webp" alt="Sobre">
                <span>Sobre</span>
            </a>
        </nav>
    </aside>

    <!-- ── BOLHAS ── -->
    <div class="bolhas">
        <span style="--i:0"></span>
        <span style="--i:13"></span>
        <span style="--i:14"></span>
        <span style="--i:4"></span>
        <span style="--i:21"></span>
        <span style="--i:9"></span>
        <span style="--i:18"></span>
        <span style="--i:4"></span>
        <span style="--i:8"></span>
        <span style="--i:5"></span>
        <span style="--i:9"></span>
        <span style="--i:18"></span>
        <span style="--i:13"></span>
        <span style="--i:16"></span>
        <span style="--i:12"></span>
        <span style="--i:8"></span>
        <span style="--i:7"></span>
        <span style="--i:19"></span>
        <span style="--i:10"></span>
    </div>

    <!-- ── CONTEÚDO PRINCIPAL ── -->
    <main class="content">
        <div class="criar-conta-wrapper">

            <!-- Card do formulário -->
            <div class="criar-conta-card">
                <div class="card-header">
                    <h1 class="card-titulo">Criar Conta</h1>
                    <p class="card-subtitulo">Preencha os campos abaixo para se cadastrar</p>
                </div>

                <!-- Mensagem de feedback (oculta por padrão) -->
                <div id="mensagem" class="mensagem oculto"></div>

                <div class="form-grid">

                    <!-- Nome -->
                    <div class="campo campo-full">
                        <label for="nome">Nome completo</label>
                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Ex.: Maria Silva"
                            maxlength="100"
                            required
                        >
                        <span class="campo-erro" id="erro-nome"></span>
                    </div>

                    <!-- Email -->
                    <div class="campo campo-full">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Ex.: maria@email.com"
                            maxlength="150"
                            required
                        >
                        <span class="campo-erro" id="erro-email"></span>
                    </div>

                    <!-- Senha -->
                    <div class="campo">
                        <label for="senha">Senha</label>
                        <div class="input-senha-wrapper">
                            <input
                                type="password"
                                id="senha"
                                name="senha"
                                placeholder="Mín. 8 caracteres"
                                maxlength="255"
                                required
                            >
                            <button type="button" class="toggle-senha" aria-label="Mostrar senha" data-alvo="senha">
                                👁
                            </button>
                        </div>
                        <span class="campo-erro" id="erro-senha"></span>
                    </div>

                    <!-- Confirmar Senha -->
                    <div class="campo">
                        <label for="confirmarSenha">Confirmar senha</label>
                        <div class="input-senha-wrapper">
                            <input
                                type="password"
                                id="confirmarSenha"
                                name="confirmarSenha"
                                placeholder="Repita a senha"
                                maxlength="255"
                                required
                            >
                            <button type="button" class="toggle-senha" aria-label="Mostrar senha" data-alvo="confirmarSenha">
                                👁
                            </button>
                        </div>
                        <span class="campo-erro" id="erro-confirmarSenha"></span>
                    </div>

                    <!-- Idade -->
                    <div class="campo">
                        <label for="idade">Idade</label>
                        <input
                            type="number"
                            id="idade"
                            name="idade"
                            placeholder="Ex.: 25"
                            min="0"
                            max="120"
                            required
                        >
                        <span class="campo-erro" id="erro-idade"></span>
                    </div>

                    <!-- Telefone -->
                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input
                            type="tel"
                            id="telefone"
                            name="telefone"
                            placeholder="(00) 00000-0000"
                            maxlength="20"
                            required
                        >
                        <span class="campo-erro" id="erro-telefone"></span>
                    </div>

                    <!-- Gênero -->
                    <div class="campo campo-full">
                        <label>Gênero</label>
                        <div class="genero-opcoes">
                            <label class="genero-label">
                                <input type="radio" name="genero" value="Masculino" required>
                                <span>Masculino</span>
                            </label>
                            <label class="genero-label">
                                <input type="radio" name="genero" value="Feminino">
                                <span>Feminino</span>
                            </label>
                            <label class="genero-label">
                                <input type="radio" name="genero" value="Outro">
                                <span>Outro</span>
                            </label>
                        </div>
                        <span class="campo-erro" id="erro-genero"></span>
                    </div>

                </div><!-- /form-grid -->

                <!-- Botão -->
                <button type="button" id="btnCriarConta" class="btn-criar">
                    <span id="btnTexto">Criar conta</span>
                    <span id="btnLoader" class="loader oculto"></span>
                </button>

                <p class="link-login">
                    Já tem conta? <a href="login.html">Entrar</a>
                </p>
            </div><!-- /criar-conta-card -->

        </div>
    </main>

    <footer class="footer">
        © 2026 CajomaX — Todos os direitos reservados
    </footer>

    <script src="../js/criarConta.js"></script>
</body>
</html>
