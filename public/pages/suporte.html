<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte – CajomaX</title>

    <link rel="icon" href="../assets/icons/icon_abaCajomax.png" type="image/png">
    <!--Link CSS global (o css usado em todas as paginas)-->
    <link rel="stylesheet" href="../css/global.css">
    <!--Link do CSS proprio da pagina suporte.css -->
    <link rel="stylesheet" href="../css/suporte.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="../index.html">
            <img class="icon" src="../assets/icons/mascote_cajomaxIcon.ico" alt="Logo CajomaX">
        </a>
        <a href="../login.html">
            <img class="img" src="../assets/icons/user_icon.png" alt="Logar">
        </a>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <nav>
            <a href="../index.html">
                <img src="../assets/icons/home.webp" alt="Home">
                <span>Home</span>
            </a>
            <a href="config.html">
                <img src="../assets/icons/setting.webp" alt="Config">
                <span>Configuração</span>
            </a>
            <a href="suporte.html">
                <img src="../assets/icons/support.webp" alt="Suporte">
                <span>Suporte</span>
            </a>
            <a href="sobre.html">
                <img src="../assets/icons/question.webp" alt="Sobre">
                <span>Sobre</span>
            </a>
        </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="content">
        <div class="cajomax-container">
            <div class="cajomax-hero">
                <h1 class="cajomax-title">Suporte</h1>
                <p class="cajomax-subtitle">Como podemos te ajudar?</p>
            </div>
        </div>

        <!-- TICKET DE SUPORTE -->
        <div class="suporte-container">
            <h2>Abrir chamado</h2>

            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Seu nome completo">

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">

            <label for="categoria">Categoria</label>
            <select id="categoria">
                <option value="">Selecione uma categoria</option>
                <option value="conta">Problema com conta</option>
                <option value="tecnico">Erro técnico</option>
                <option value="sugestao">Sugestão</option>
                <option value="outro">Outro</option>
            </select>

            <label for="mensagem">Descrição do problema</label>
            <textarea id="mensagem" placeholder="Descreva seu problema com detalhes..."></textarea>

            <button class="btn-enviar" onclick="enviarTicket()">Enviar</button>

            <div class="mensagem-sucesso" id="mensagem-sucesso">
                ✅ Problema enviado com sucesso! Entraremos em contato em breve.
            </div>
        </div>

        <footer class="footer">
            © 2026 CajomaX — Todos os direitos reservados
        </footer>
    </main>

    <!--Link js-->
    <script src="../js/scriptsuporte.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
